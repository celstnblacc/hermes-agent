  - GHA-002
  # SC-004: shell script advisory — upstream scripts
  - SC-004
  # PY-003: pickle deserialization — upstream agent core architectural pattern
  - PY-003
  # PY-007: subprocess shell=True — upstream gateway code, tracked for remediation
  - PY-007
  # PY-012: tempfile cleanup — upstream code
  - PY-012
  # SEC-001: AWS key pattern in agent/redact.py and tools/skills_guard.py
  # FALSE POSITIVE — these are regex patterns used to DETECT and REDACT secrets,
  # not actual credentials. e.g. r"AKIA[A-Z0-9]{16}" is a detection regex.
  - SEC-001
  # SEC-003: GitHub token pattern — same as SEC-001, detection regex in redact.py
  # FALSE POSITIVE — r"ghp_..." appears in the redaction module, not as a live token.
  - SEC-003
  # SEC-007: upstream code pattern — reviewed, false positive
  - SEC-007
  # PY-001: archive member validation — upstream code, tracked for remediation
  - PY-001
