# ShipGuard configuration for hermes-agent
# Reviewed 2026-04-02 — security-hardened fork of upstream hermes-agent
# All disabled rules cover pre-existing upstream issues, not introduced by this fork.
# Remediation backlog: docs/plans/security-hardening-refactor.md

# Disable rules that are pre-existing upstream debt
disable_rules:
